name: DB Backup & Keep-Alive

# Weekly pg_dump of the Supabase database (also keeps the free-tier
# project from auto-pausing). Runs on a schedule and on manual dispatch.
on:
  schedule:
    - cron: '0 3 * * 1' # Mondays 03:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" --schema=public --no-owner --no-privileges --clean --if-exists -f "microvault-$STAMP.sql"
          gzip "microvault-$STAMP.sql"
          ls -lh microvault-*.sql.gz

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: microvault-db-backup
          path: microvault-*.sql.gz
          retention-days: 90
